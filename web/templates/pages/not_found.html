{{define "templates/pages/not_found"}}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <!-- Tailwind CDN for quick setup -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-slate-950 font-sans text-slate-200 antialiased selection:bg-indigo-500 selection:text-white">

    <!-- Decorative subtle background glow -->
    <div class="absolute inset-0 -z-10 overflow-hidden">
        <div class="absolute -top-40 left-1/2 -z-10 h-[1000px] w-[1000px] -translate-x-1/2 rounded-full bg-[radial-gradient(circle_at_center,rgba(99,102,241,0.08)_0,transparent_60%)]"></div>
    </div>

    <!-- Main Container -->
    <main class="grid min-h-full place-items-center px-6 py-24 sm:py-32 lg:px-8">
        <div class="text-center">
            
            <!-- Graphic "404" Badge -->
            <div class="inline-flex items-center justify-center rounded-full bg-indigo-500/10 px-4 py-1.5 text-sm font-semibold tracking-wide text-indigo-400 ring-1 ring-inset ring-indigo-500/20 backdrop-blur-sm">
                Error 404
            </div>

            <!-- Big Bold Typography -->
            <h1 class="mt-6 text-5xl font-extrabold tracking-tight text-white sm:text-7xl bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
                Lost in the deep?
            </h1>
            
            <p class="mt-6 text-base leading-7 text-slate-400 max-w-md mx-auto">
                The page you are looking for doesn't exist, has been migrated, or is taking an unannounced coffee break.
            </p>

            <!-- Action Buttons -->
            <div class="mt-10 flex items-center justify-center gap-x-6">
                <!-- Primary Button with subtle focus glow -->
                <a href="/" class="group relative rounded-xl bg-indigo-600 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-indigo-600/20 transition-all duration-200 hover:bg-indigo-500 hover:shadow-indigo-500/30 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
                    Take me home
                    <!-- Subtle arrow transition on hover -->
                    <span class="inline-block transition-transform duration-200 group-hover:translate-x-1 ml-1" aria-hidden="true">&rarr;</span>
                </a>
                
                <!-- Secondary Link -->
                <a href="/support" class="text-sm font-semibold text-slate-300 hover:text-white transition-colors duration-100">
                    Contact support
                </a>
            </div>

            <!-- Subtle Decorative Code Snippet Footer -->
            <div class="mt-16 text-xs font-mono text-slate-600 border border-slate-900 bg-slate-900/40 rounded-lg p-3 max-w-xs mx-auto backdrop-blur-sm">
                <span class="text-indigo-400">HTTP_ERR:</span> 0x1A4_NOT_FOUND
            </div>

        </div>
    </main>

</body>
</html>
{{end}}
